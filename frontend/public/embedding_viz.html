    outline: none;

  }

  }

function debounce(func, timeout = 250) {
  let timer;
  return (...args) => {
    clearTimeout(timer);
    timer = setTimeout(() => { func.apply(this, args); }, timeout);
  };
}

async function simpleArrowParser(arrow_bytes) {
  const table = await Arrow.tableFromIPC(arrow_bytes);
  const result = {};
  table.schema.fields.forEach((field) => {
    result[field.name] = table.getChild(field.name).toArray();
  });
  return result;
}

function mergeTypedArrays(arrays) {
  let totalLength = arrays.reduce((acc, arr) => acc + arr.length, 0);
  let result = new arrays[0].constructor(totalLength);
  let currentLength = 0;
  for (let arr of arrays) {
    result.set(arr, currentLength);
    currentLength += arr.length;
  }
  return result;
}



function updateProgressBar(id, progress) {
  const progressBar = document.querySelector(`#${id} .datamapplot-progress-bar-fill`);
  const progressText = document.querySelector(`#${id} .datamapplot-progress-bar-text`);
  if (progressBar && progressText) {
    progressBar.style.width = `${progress}%`;
    progressText.textContent = `${id.replace('-progress', '').replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase())}: ${progress}%`;
  }
}

function checkAllDataLoaded() {
  const progressBars = document.querySelectorAll('.datamapplot-progress-bar-fill');
  const allLoaded = Array.from(progressBars).every(bar => bar.style.width === '100%');
  if (allLoaded) {
    const loadingEl = document.getElementById("loading");
    const progressEl = document.getElementById("progress-container");
    if (loadingEl) loadingEl.style.display = "none";
    if (progressEl) progressEl.style.display = "none";
    // Dispatch unified event for widgets to listen on
    document.dispatchEvent(new CustomEvent('datamapDataLoaded'));
  }
}

    const decompressedData = await DecompressBytes(decodedData);
    if (JSONParse) {
      const parsedData = JSON.parse(new TextDecoder("utf-8").decode(decompressedData));
      self.postMessage({ type: "data", data: parsedData });
    } else {
      self.postMessage({ type: "data", data: decompressedData });
    }
  }

// =============================================================================
// Density Tile Image Resolver
// =============================================================================

async function resolveDensityTileImages(tilePyramids) {
  // When running inside a Jupyter notebook with file-based data, image URLs
  // point at the Jupyter contents API which returns JSON with base64 content
  // instead of raw image bytes.  Detect this and convert to blob URLs so that
  // deck.gl BitmapLayer can consume them.
  const allTiles = [];
  for (const field of Object.keys(tilePyramids)) {
    for (const level of tilePyramids[field]) {
      for (const tile of level) {
        allTiles.push(tile);
      }
    }
  }
  if (allTiles.length === 0) return;

  // Only need special handling when the URL routes through /api/contents/
  const needsResolve = allTiles[0].image.includes('/api/contents/');
  if (!needsResolve) return;

  const headers = {};
  const densityApiToken = (typeof DENSITY_API_TOKEN !== 'undefined') ? DENSITY_API_TOKEN : null;
  if (densityApiToken) {
    headers['Authorization'] = 'Token ' + densityApiToken;
  }

  await Promise.all(allTiles.map(async (tile) => {
    try {
      const resp = await fetch(tile.image, { headers });
      if (!resp.ok) {
        console.error('Failed to fetch density tile:', tile.image, resp.status);
        return;
      }
      const json = await resp.json();
      const b64 = json.content;  // Jupyter contents API base64 field
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      const blob = new Blob([bytes], { type: 'image/png' });
      tile.image = URL.createObjectURL(blob);
    } catch (e) {
      console.error('Error resolving density tile image:', e);
    }
  }));
}
